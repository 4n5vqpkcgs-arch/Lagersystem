
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Lagersystem</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

.subRow{
background:#fafafa;
}

#adminPanel{
margin-top:20px;
background:white;
padding:10px;
display:none;
}

#history{
background:white;
padding:10px;
max-height:200px;
overflow:auto;
}

</style>

</head>

<body>

<div id="loginBox">

<h2>Login</h2>

<input id="user" placeholder="Benutzername">
<input id="pass" type="password" placeholder="Passwort">

<br>

<button onclick="login()">Login</button>
<button onclick="register()">Registrieren</button>

</div>

<div id="app" style="display:none">

<h1>Lagersystem</h1>

<button onclick="logout()">Abmelden</button>

<br><br>

<input id="name" placeholder="Artikel">
<input id="qty" type="number" placeholder="Menge">
<input id="location" placeholder="Ort">

<button onclick="addItem()">Hinzufügen</button>
<button onclick="removeQty()">Menge reduzieren</button>
<button onclick="deleteItem()">Artikel löschen</button>
<button onclick="addLocation()">Ort hinzufügen</button>

<br><br>

<input id="search" placeholder="Live Suche" oninput="showInventory()">

<h3>Lagerbestand</h3>

<table>

<thead>
<tr>
<th>Artikel</th>
<th>Menge</th>
<th>Ort</th>
<th>QR</th>
</tr>
</thead>

<tbody id="inventory"></tbody>

</table>

<h3>QR Code</h3>
<div id="qrcode"></div>

<h3>Statistik</h3>
<p id="stats"></p>

<h3>Historie</h3>
<div id="history"></div>

<div id="adminPanel">

<h2>Admin Panel</h2>

<button onclick="showUsers()">Benutzer anzeigen</button>
<button onclick="clearInventory()">Lager löschen</button>
<button onclick="clearHistory()">Historie löschen</button>

<h3>Benutzerverwaltung</h3>

<input id="deleteUserName" placeholder="Benutzer löschen">
<button onclick="deleteUser()">Benutzer löschen</button>

<input id="changeUserName" placeholder="Benutzer">
<input id="newPassword" placeholder="Neues Passwort">
<button onclick="changePassword()">Passwort ändern</button>

<div id="adminOutput"></div>

</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || {}
let inventory = JSON.parse(localStorage.getItem("inventory")) || {}
let history = JSON.parse(localStorage.getItem("history")) || []

let expandedItems = {}

let currentUser=""
let currentRole=""

function save(){

localStorage.setItem("users",JSON.stringify(users))
localStorage.setItem("inventory",JSON.stringify(inventory))
localStorage.setItem("history",JSON.stringify(history))

}

/* SESSION CHECK */

let savedUser = localStorage.getItem("sessionUser")

if(savedUser && users[savedUser]){

currentUser=savedUser
currentRole=users[savedUser].role

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

if(currentRole==="admin"){
document.getElementById("adminPanel").style.display="block"
}

showInventory()
showHistory()

}

/* LOGIN */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].password==p){

localStorage.setItem("sessionUser",u)

location.reload()

}else{

alert("Login falsch")

}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("sessionUser")

location.reload()

}

/* REGISTER */

function register(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

users[u]={password:p,role:"worker"}

save()

alert("Benutzer erstellt")

}

/* HISTORY */

function log(text){

let time=new Date().toLocaleString()

history.unshift(time+" → "+text)

save()

showHistory()

}

/* ADD ITEM */

function addItem(){

let name=document.getElementById("name").value
let qty=Number(document.getElementById("qty").value)
let location=document.getElementById("location").value

if(!inventory[name]) inventory[name]=[]

let found=false

inventory[name].forEach(p=>{

if(p.location===location){
p.qty+=qty
found=true
}

})

if(!found){

inventory[name].push({qty:qty,location:location})

}

log(name+" +"+qty+" ("+location+")")

save()

showInventory()

}

/* REMOVE QTY */

function removeQty(){

let name=document.getElementById("name").value
let qty=Number(document.getElementById("qty").value)
let location=document.getElementById("location").value

if(!inventory[name]) return

inventory[name].forEach(p=>{

if(p.location===location){

p.qty-=qty

if(p.qty<0) p.qty=0

}

})

log(name+" -"+qty+" ("+location+")")

save()

showInventory()

}

/* DELETE ITEM ONLY AT LOCATION */

function deleteItem(){

let name=document.getElementById("name").value
let location=document.getElementById("location").value

if(!inventory[name]){
alert("Artikel existiert nicht")
return
}

inventory[name]=inventory[name].filter(p=>p.location!==location)

log("Artikel gelöscht "+name+" ("+location+")")

if(inventory[name].length===0){
delete inventory[name]
}

save()
showInventory()

}

/* ADD LOCATION */

function addLocation(){

let name=document.getElementById("name").value
let location=document.getElementById("location").value

if(!inventory[name]){
alert("Artikel existiert nicht")
return
}

let exists=false

inventory[name].forEach(p=>{
if(p.location===location){
exists=true
}
})

if(exists){
alert("Dieser Ort existiert bereits")
return
}

inventory[name].push({qty:0,location:location})

log("Neuer Ort hinzugefügt "+name+" "+location)

save()
showInventory()

}

/* EXPAND */

function toggleItem(item){

expandedItems[item]=!expandedItems[item]

showInventory()

}

/* INVENTORY TABLE */

function showInventory(){

let tbody=document.getElementById("inventory")
let search=document.getElementById("search").value.toLowerCase()

tbody.innerHTML=""

let total=0
let types=0

for(let item in inventory){

if(!item.toLowerCase().includes(search)) continue

let places=inventory[item]

let sum=0
places.forEach(p=>sum+=p.qty)

total+=sum
types++

if(places.length===1){

let p=places[0]

let row=document.createElement("tr")

row.innerHTML=
"<td>"+item+"</td>"+
"<td>"+p.qty+"</td>"+
"<td>"+p.location+"</td>"+
"<td><button onclick=\"generateQR('"+item+"','"+p.location+"')\">QR</button></td>"

tbody.appendChild(row)

}

else{

let arrow=expandedItems[item]?"▼":"▶"

let row=document.createElement("tr")

row.innerHTML=
"<td><button onclick=\"toggleItem('"+item+"')\">"+arrow+"</button> "+item+"</td>"+
"<td>"+sum+"</td>"+
"<td></td>"+
"<td></td>"

tbody.appendChild(row)

if(expandedItems[item]){

places.forEach(p=>{

let sub=document.createElement("tr")

sub.className="subRow"

sub.innerHTML=
"<td>"+item+"</td>"+
"<td>"+p.qty+"</td>"+
"<td>"+p.location+"</td>"+
"<td><button onclick=\"generateQR('"+item+"','"+p.location+"')\">QR</button></td>"

tbody.appendChild(sub)

})

}

}

}

document.getElementById("stats").textContent=
"Artikeltypen: "+types+" | Gesamtstücke: "+total

}

/* QR */

function generateQR(item,location){

document.getElementById("qrcode").innerHTML=""

let url=window.location.href.split("?")[0]+"?item="+item+"&location="+location

new QRCode(document.getElementById("qrcode"),url)

}

/* HISTORY DISPLAY */

function showHistory(){

let div=document.getElementById("history")

div.innerHTML=""

history.slice(0,50).forEach(entry=>{

let p=document.createElement("div")
p.textContent=entry
div.appendChild(p)

})

}

/* ADMIN USERS */

function showUsers(){

let out=document.getElementById("adminOutput")

out.innerHTML=""

for(let u in users){

let div=document.createElement("div")
div.textContent=u+" ("+users[u].role+")"

out.appendChild(div)

}

}

/* DELETE USER */

function deleteUser(){

let u=document.getElementById("deleteUserName").value

delete users[u]

save()

}

/* CHANGE PASSWORD */

function changePassword(){

let u=document.getElementById("changeUserName").value
let p=document.getElementById("newPassword").value

users[u].password=p

save()

}

/* CLEAR INVENTORY */

function clearInventory(){

let confirm1=confirm("Willst du wirklich das gesamte Lager löschen?")
if(!confirm1) return

let code=prompt("Zur Sicherheit 'ADMIN' eingeben")

if(code!=="ADMIN"){
alert("Löschung abgebrochen")
return
}

inventory={}

save()
showInventory()

}

/* CLEAR HISTORY */

function clearHistory(){

let confirm1=confirm("Willst du wirklich die Historie löschen?")
if(!confirm1) return

let code=prompt("Zur Sicherheit 'ADMIN' eingeben")

if(code!=="ADMIN"){
alert("Löschung abgebrochen")
return
}

history=[]

save()
showHistory()

}

/* QR LINK AUTOLOAD */

function loadQRData(){

let params=new URLSearchParams(window.location.search)

let item=params.get("item")
let location=params.get("location")

if(item) document.getElementById("name").value=item
if(location) document.getElementById("location").value=location

}

window.onload=function(){

loadQRData()

}

</script>

</body>
</html>
